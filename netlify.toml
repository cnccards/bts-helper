[build]
  functions = "netlify/functions"
  publish = "."

[[redirects]]
  from = "/api/picks"
  to = "/.netlify/functions/picks"
  status = 200

[[redirects]]
  from = "/api/myplayers"
  to = "/.netlify/functions/myplayers"
  status = 200

[[redirects]]
  from = "/api/homeruns"
  to = "/.netlify/functions/homeruns"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "https://site.api.espn.com/:splat"
  status = 200
